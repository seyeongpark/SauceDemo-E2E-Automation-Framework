# pytest.ini

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# pytest 추가 옵션
addopts = 
    --headed
    --browser chromium
    --screenshot=only-on-failure
    --video=retain-on-failure
    --tracing=retain-on-failure
    --output=test-results
    -v

markers = 
    smoke: 빠르게 핵심 기능만 검증 (PR마다 실행)
    regression: 전체 회귀 테스트 (nightly 실행)
    e2e: 앤드투앤드 시나리오
    api: API 레벨 테스트